apiVersion: v1
kind: Service
metadata:
  name: fund-transfer-service-svc
  namespace: banking-dev
  annotations:
    harness.io/primary-service: "true"
spec:
  type: ClusterIP
  selector:
    app: fund-transfer-service
  ports:
    - name: http
      port: 80
      targetPort: 8084

---
apiVersion: v1
kind: Service
metadata:
  name: fund-transfer-service-svc-stage
  namespace: banking-dev
  annotations:
    harness.io/stage-service: "true"
spec:
  type: ClusterIP
  selector:
    app: fund-transfer-service
  ports:
    - name: http
      port: 80
      targetPort: 8084
